<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 14px;
        }

        h1 {
            font-size: clamp(1.1rem, 5vw, 1.9rem);
            color: #ff6b6b;
            text-shadow: 0 0 24px rgba(255, 107, 107, 0.4);
            letter-spacing: 2px;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        label {
            font-size: 0.85rem;
            opacity: 0.65;
        }

        select {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn {
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #e05050;
        }

        .stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: #1a1a2e;
            border: 1px solid #252545;
            border-radius: 12px;
            padding: 7px 16px;
            text-align: center;
            min-width: 70px;
        }

        .slabel {
            font-size: 0.62rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sval {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b6b;
            line-height: 1.3;
        }

        #grid {
            display: grid;
        }

        .wrap {
            perspective: 600px;
            flex-shrink: 0;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-radius: 10px;
        }

        .card.flipped,
        .card.matched {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .fback {
            background: linear-gradient(145deg, #1e1e4e, #16213e);
            border: 2px solid #2e3060;
            color: #4455aa;
        }

        .ffront {
            background: #1e1e30;
            border: 2px solid #ff6b6b;
            transform: rotateY(180deg);
        }

        .card.matched .ffront {
            border-color: #4ecca3;
            background: rgba(78, 204, 163, 0.12);
        }

        #win {
            display: none;
            background: linear-gradient(135deg, #ff6b6b, #a855f7);
            border-radius: 16px;
            padding: 16px 32px;
            text-align: center;
        }

        #win.show {
            display: block;
            animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #win h2 {
            font-size: 1.4rem;
        }

        #win p {
            font-size: 0.85rem;
            margin-top: 6px;
            opacity: 0.9;
        }

        @keyframes pop {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes matched-glow {

            0%,
            100% {
                box-shadow: 0 0 0px #4ecca3;
            }

            50% {
                box-shadow: 0 0 16px #4ecca3;
            }
        }

        .card.matched .ffront {
            animation: matched-glow 0.6s ease;
        }
    </style>
</head>

<body>

    <h1>🃏 Memory Match</h1>

    <div class="row">
        <label for="sz">Grid Size:</label>
        <select id="sz">
            <option value="2">2 × 2</option>
            <option value="4" selected>4 × 4</option>
            <option value="6">6 × 6</option>
        </select>
        <button class="btn" id="newBtn">▶ New Game</button>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="slabel">Moves</div>
            <div class="sval" id="mEl">0</div>
        </div>
        <div class="stat">
            <div class="slabel">Time</div>
            <div class="sval" id="tEl">0:00</div>
        </div>
        <div class="stat">
            <div class="slabel">Pairs</div>
            <div class="sval" id="pEl">0 / 0</div>
        </div>
    </div>

    <div id="grid"></div>

    <div id="win">
        <h2>🎉 Puzzle Solved!</h2>
        <p id="wInfo"></p>
    </div>

    <script>
        const POOL = [
            '🐶', '🐱', '🦊', '🐻', '🐼', '🐯', '🦁', '🐸', '🐙', '🦋',
            '🌸', '⭐', '🍕', '🎸', '🚀', '🌈', '💎', '🔥', '🌊', '🎯',
            '🏆', '🎪', '🦄', '🍦', '🐬', '🦜', '🌵', '🍩', '🎲', '🧩'
        ];

        const $ = id => document.getElementById(id);
        const grid = $('grid'), mEl = $('mEl'), tEl = $('tEl'), pEl = $('pEl'),
            winEl = $('win'), wInfo = $('wInfo');

        let flipped = [], matched = 0, pairs = 0, moves = 0, secs = 0, tid = null, lock = false, live = false;

        const fmt = s => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function newGame() {
            const size = +$('sz').value;
            pairs = (size * size) / 2;
            matched = moves = secs = 0;
            flipped = []; lock = live = false;
            clearInterval(tid); tid = null;

            mEl.textContent = '0';
            tEl.textContent = '0:00';
            pEl.textContent = `0 / ${pairs}`;
            winEl.classList.remove('show');

            const avail = Math.min(window.innerWidth - 32, 560);
            const gap = Math.max(5, Math.floor(avail / (size * 8)));
            const cw = Math.floor((avail - gap * (size - 1)) / size);
            const gw = cw * size + gap * (size - 1);
            const fs = Math.max(12, Math.floor(cw * 0.44));
            const bfs = Math.max(10, Math.floor(cw * 0.32));

            grid.style.cssText = `
      grid-template-columns: repeat(${size}, ${cw}px);
      gap: ${gap}px;
      width: ${gw}px;
    `;
            grid.innerHTML = '';

            const deck = shuffle([...POOL.slice(0, pairs), ...POOL.slice(0, pairs)]);

            deck.forEach(e => {
                const wrap = document.createElement('div');
                wrap.className = 'wrap';
                wrap.style.cssText = `width:${cw}px;height:${cw}px;`;

                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.e = e;

                const back = document.createElement('div');
                back.className = 'face fback';
                back.style.fontSize = bfs + 'px';
                back.textContent = '◈';

                const front = document.createElement('div');
                front.className = 'face ffront';
                front.style.fontSize = fs + 'px';
                front.textContent = e;

                card.append(back, front);
                wrap.appendChild(card);
                card.addEventListener('click', () => onClick(card));
                grid.appendChild(wrap);
            });
        }

        function onClick(card) {
            if (lock || card.classList.contains('flipped') || card.classList.contains('matched') || flipped.length >= 2) return;

            if (!live) {
                live = true;
                tid = setInterval(() => { secs++; tEl.textContent = fmt(secs); }, 1000);
            }

            card.classList.add('flipped');
            flipped.push(card);

            if (flipped.length === 2) {
                moves++;
                mEl.textContent = moves;
                lock = true;
                setTimeout(check, 850);
            }
        }

        function check() {
            const [a, b] = flipped;
            if (a.dataset.e === b.dataset.e) {
                a.classList.add('matched');
                b.classList.add('matched');
                matched++;
                pEl.textContent = `${matched} / ${pairs}`;
                if (matched === pairs) {
                    clearInterval(tid);
                    wInfo.textContent = `${moves} moves · ${fmt(secs)}`;
                    winEl.classList.add('show');
                }
            } else {
                a.classList.remove('flipped');
                b.classList.remove('flipped');
            }
            flipped = [];
            lock = false;
        }

        $('newBtn').addEventListener('click', newGame);

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(newGame, 250);
        });

        newGame();
    </script>
</body>

</html>
